services:
  db:
    image: mysql:5.7
    container_name: ahmed_db
    restart: always
    env_file:
      - .env
    volumes:
      - /var/lib/mysql:/var/lib/mysql

  wordpress:
    image: wordpress:latest
    container_name: wordpress_app
    restart: always
    depends_on:
      - db
    ports:
      - "8080:80"
    env_file:
      - .env